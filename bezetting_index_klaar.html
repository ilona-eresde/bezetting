<!doctype html><html lang="nl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Eresdé Bezettingsplanner</title>
<style>:root{--g:#91b600;--d:#1f2937;--l:#d9dee7;--b:#f4f6f8;--s:#eef3d8;--r:#fee2e2;--rt:#991b1b;--o:#dcfce7;--ot:#166534;--w:#fff7ed;--wt:#9a3412;--bl:#dbeafe;--bt:#1e40af}*{box-sizing:border-box}body{font-family:Arial,sans-serif;margin:0;background:var(--b);color:var(--d)}.top{background:var(--g);padding:12px 15px}.top a{color:white;text-decoration:none;font-weight:900}header{background:var(--g);color:white;padding:18px 16px;font-size:24px;font-weight:900}main{max-width:1160px;margin:auto;padding:14px}.card{background:white;border-radius:16px;padding:16px;margin:12px 0;box-shadow:0 2px 8px #0001}.tabs,.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}button{font-size:18px;padding:13px 16px;border:0;border-radius:12px;font-weight:900;cursor:pointer}.primary{background:var(--g);color:white}.secondary{background:#e5e7eb;color:#111827}.danger{background:var(--r);color:var(--rt)}label{font-size:14px;font-weight:900;display:block;margin-bottom:5px}input,select,textarea{width:100%;font-size:18px;padding:12px;border:1px solid var(--l);border-radius:11px;background:white}textarea{min-height:72px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.kpi{background:var(--s);border-radius:13px;padding:12px;text-align:center;font-weight:900}.kpi .num{font-size:32px;color:var(--g)}.kpi.bad{background:var(--r);color:var(--rt)}.kpi.bad .num{color:var(--rt)}.kpi.warn{background:var(--w);color:var(--wt)}.kpi.warn .num{color:var(--wt)}.kpi.blue{background:var(--bl);color:var(--bt)}.kpi.blue .num{color:var(--bt)}.small{font-size:13px;color:#6b7280}.hidden{display:none!important}table{width:100%;border-collapse:collapse;margin-top:12px}th,td{border-bottom:1px solid var(--l);padding:10px;text-align:left;font-size:14px;vertical-align:top}th{background:#f9fafb}.ok,.badge,.badg,.maybe{display:inline-block;padding:5px 9px;border-radius:999px;font-weight:900;font-size:13px}.ok{background:var(--o);color:var(--ot)}.badg{background:var(--r);color:var(--rt)}.maybe{background:var(--w);color:var(--wt)}.badge{background:var(--s)}.empty{padding:20px;text-align:center;color:#6b7280;font-weight:700}.rowActions button{font-size:13px;padding:7px 9px;margin:2px}@media(max-width:760px){.grid,.grid3,.summary{grid-template-columns:1fr}button{width:100%}table,thead,tbody,tr,td,th{display:block}thead{display:none}tr{border:1px solid var(--l);border-radius:12px;margin:10px 0;padding:8px}td{border:0;padding:6px 4px}td:before{content:attr(data-label);display:block;font-weight:900;font-size:12px;color:#6b7280}.rowActions button{width:auto}}@media print{.noPrint{display:none!important}body{background:white}.card{box-shadow:none;border:1px solid #ddd}}</style>
</head><body><div class="top noPrint"><a href="index.html">← Terug</a></div><header>🏖️ Eresdé Bezettingsplanner <span style="font-size:14px">v1</span></header><main>
<section class="card noPrint"><div class="tabs"><button class="primary" onclick="show('dash')">Dashboard</button><button class="secondary" onclick="show('med')">Medewerkers</button><button class="secondary" onclick="show('bez')">Bezetting</button><button class="secondary" onclick="show('verlof')">Verlof</button><button class="secondary" onclick="show('sluit')">Klantsluitingen</button><button class="secondary" onclick="window.print()">Print / PDF</button></div></section>
<section class="card noPrint"><strong>☁️ Drive-sync</strong><br><span class="small" id="syncStatus">Nog niet geladen.</span><div class="actions"><button class="secondary" onclick="loadProjects()">📁 Projecten laden</button><button class="secondary" onclick="loadPlanner(false)">☁️ Planner laden</button><button class="secondary" onclick="syncPlanner(true)">☁️ Planner opslaan</button></div></section>
<section id="dash"><section class="card"><div class="grid3 noPrint"><div><label>Jaar</label><input id="year" type="number" onchange="renderDash()"></div><div><label>Week</label><input id="week" type="number" min="1" max="53" onchange="renderDash()"></div><div><label>Rayon</label><select id="rayonFilter" onchange="renderDash()"><option value="">Alle rayons</option></select></div></div><div class="summary" style="margin-top:12px"><div class="kpi"><div class="num" id="kAbs">0</div>afwezig</div><div class="kpi blue"><div class="num" id="kClose">0</div>klanten gesloten</div><div class="kpi bad"><div class="num" id="kAct">0</div>actie nodig</div><div class="kpi warn"><div class="num" id="kCheck">0</div>controle</div></div></section><section class="card"><h2>⚠️ Actielijst</h2><div id="actionWrap"></div></section><section class="card"><h2>📅 Weekoverzicht</h2><div id="weekWrap"></div></section></section>
<section id="med" class="hidden"><section class="card noPrint"><h2>👥 Medewerker</h2><div class="grid"><div><label>Naam</label><input id="empName"></div><div><label>Rayon/regio</label><input id="empRayon"></div><div><label>Telefoon</label><input id="empPhone"></div><div><label>Status</label><select id="empActive"><option value="true">Actief</option><option value="false">Inactief</option></select></div></div><div class="actions"><button class="primary" onclick="saveEmp()">Opslaan</button><button class="secondary" onclick="clearEmp()">Leegmaken</button></div></section><section class="card"><h2>Medewerkers</h2><div id="empWrap"></div></section></section>
<section id="bez" class="hidden"><section class="card noPrint"><h2>🔗 Bezetting</h2><div class="grid3"><div><label>Project</label><input id="assProject" list="projectList"></div><div><label>Vaste medewerker</label><select id="assEmp"></select></div><div><label>Reserve</label><select id="assRes"></select></div></div><label style="margin-top:12px">Opmerking</label><textarea id="assNote"></textarea><div class="actions"><button class="primary" onclick="saveAss()">Opslaan</button><button class="secondary" onclick="clearAss()">Leegmaken</button></div></section><section class="card"><h2>Bezetting per project</h2><div id="assWrap"></div></section></section>
<section id="verlof" class="hidden"><section class="card noPrint"><h2>🌴 Verlof / afwezigheid</h2><div class="grid3"><div><label>Medewerker</label><select id="absEmp"></select></div><div><label>Type</label><select id="absType"><option>Vakantie</option><option>Ziek</option><option>Cursus</option><option>Verlof</option><option>Niet beschikbaar</option></select></div><div><label>Invoer</label><select id="absMode" onchange="toggleMode('abs')"><option value="date">Datum</option><option value="week">Weeknummer</option></select></div></div><div class="grid3" id="absDate"><div><label>Van</label><input id="absStart" type="date"></div><div><label>Tot</label><input id="absEnd" type="date"></div><div><label>Opmerking</label><input id="absNote"></div></div><div class="grid3 hidden" id="absWeekFields"><div><label>Jaar</label><input id="absYear" type="number"></div><div><label>Week</label><input id="absWeek" type="number" min="1" max="53"></div><div><label>Opmerking</label><input id="absWNote"></div></div><div class="actions"><button class="primary" onclick="saveAbs()">Opslaan</button><button class="secondary" onclick="clearAbs()">Leegmaken</button></div></section><section class="card"><h2>Afwezigheden</h2><div id="absWrap"></div></section></section>
<section id="sluit" class="hidden"><section class="card noPrint"><h2>🔒 Klantsluiting</h2><div class="grid3"><div><label>Project</label><input id="clProject" list="projectList"></div><div><label>Type</label><select id="clType"><option>Zomersluiting</option><option>Kerstsluiting</option><option>Verbouwing</option><option>Incidenteel gesloten</option><option>Overig</option></select></div><div><label>Invoer</label><select id="clMode" onchange="toggleMode('cl')"><option value="date">Datum</option><option value="week">Weeknummer</option></select></div></div><div class="grid3" id="clDate"><div><label>Van</label><input id="clStart" type="date"></div><div><label>Tot</label><input id="clEnd" type="date"></div><div><label>Opmerking</label><input id="clNote"></div></div><div class="grid3 hidden" id="clWeekFields"><div><label>Jaar</label><input id="clYear" type="number"></div><div><label>Week</label><input id="clWeek" type="number" min="1" max="53"></div><div><label>Opmerking</label><input id="clWNote"></div></div><div class="actions"><button class="primary" onclick="saveCl()">Opslaan</button><button class="secondary" onclick="clearCl()">Leegmaken</button></div></section><section class="card"><h2>Klantsluitingen</h2><div id="clWrap"></div></section></section><datalist id="projectList"></datalist>
<script>
const PROJECTS_WEBAPP_URL='https://script.google.com/macros/s/AKfycbysDHylCUtXBOO3P2ftygHcCE22UQXO822UYPWm33AHQD-wEH_54FpDu_DBN7Nwz29n/exec';
const PLANNER_WEBAPP_URL='https://script.google.com/macros/s/AKfycbzz7o_5CkFFDGySTbhvFvZ8qW2CeozNsH53hueabOTLMNktXLPr6Z7nOH0XwCxjFUVXXA/exec';
const KEY='eresde_bezetting_v1';let projects=[];let editEmp=null,editAss=null,editAbs=null,editCl=null;
function $(id){return document.getElementById(id)}function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function uid(){return Date.now().toString(36)+Math.random().toString(16).slice(2)}function data(){let d={};try{d=JSON.parse(localStorage.getItem(KEY)||'{}')}catch(e){};d.employees=d.employees||[];d.assignments=d.assignments||[];d.absences=d.absences||[];d.closures=d.closures||[];return d}function setData(d,sync=true){localStorage.setItem(KEY,JSON.stringify(d));renderAll();if(sync)syncPlanner(false)}function setSync(s){$('syncStatus').textContent=s}
function show(s){['dash','med','bez','verlof','sluit'].forEach(x=>$(x).classList.toggle('hidden',x!==s));renderAll()}function iso(d){return d.toISOString().slice(0,10)}function pdate(s){const [y,m,d]=String(s||'').split('-').map(Number);return new Date(y,m-1,d)}function fdate(s){return s?pdate(s).toLocaleDateString('nl-NL',{day:'2-digit',month:'2-digit',year:'numeric'}):''}function weekStart(y,w){const simple=new Date(y,0,1+(w-1)*7),dow=simple.getDay(),start=new Date(simple);if(dow<=4)start.setDate(simple.getDate()-simple.getDay()+1);else start.setDate(simple.getDate()+8-simple.getDay());return start}function weekRange(y,w){const s=weekStart(Number(y),Number(w)),e=new Date(s);e.setDate(s.getDate()+6);return {start:iso(s),end:iso(e)}}function overlap(a,b,c,d){return a<=d&&c<=b}function curWeek(){const n=new Date(),s=new Date(n.getFullYear(),0,1);return Math.max(1,Math.ceil((((n-s)/86400000)+s.getDay()+1)/7))}
function toggleMode(p){const mode=$(p+'Mode').value;$(p+'Date').classList.toggle('hidden',mode!=='date');$(p+'WeekFields').classList.toggle('hidden',mode!=='week')}
async function loadProjects(){try{setSync('Projecten laden...');const r=await fetch(PROJECTS_WEBAPP_URL+'?t='+Date.now());const list=await r.json();projects=Array.isArray(list)?list:[];localStorage.setItem(KEY+'_projects',JSON.stringify(projects));fillProjects();renderAll();setSync(projects.length+' projecten geladen.');alert(projects.length+' projecten geladen.')}catch(e){setSync('Projecten laden mislukt.');alert(e)}}function getProjects(){if(projects.length)return projects;try{projects=JSON.parse(localStorage.getItem(KEY+'_projects')||'[]')}catch(e){projects=[]}return projects}function fillProjects(){const dl=$('projectList');dl.innerHTML='';getProjects().forEach(p=>{const o=document.createElement('option');o.value=p.naam||p.project||'';dl.appendChild(o)})}function project(name){return getProjects().find(p=>(p.naam||'')===name)||{naam:name}}
async function syncPlanner(alertit=false){if(!PLANNER_WEBAPP_URL.includes('script.google.com')){setSync('Planner Drive-sync nog niet gekoppeld.');return}try{setSync('Planner opslaan...');await fetch(PLANNER_WEBAPP_URL,{method:'POST',mode:'no-cors',body:JSON.stringify({type:'data',content:JSON.stringify(data())})});setSync('Planner opgeslagen om '+new Date().toLocaleTimeString('nl-NL'));if(alertit)alert('Planner opgeslagen.')}catch(e){setSync('Opslaan mislukt.');if(alertit)alert(e)}}async function loadPlanner(auto=true){if(!PLANNER_WEBAPP_URL.includes('script.google.com')){setSync('Planner Drive-sync nog niet gekoppeld.');return}try{setSync('Planner laden...');const r=await fetch(PLANNER_WEBAPP_URL+'?t='+Date.now());const d=await r.json();if(d&&typeof d==='object'&&!Array.isArray(d)){localStorage.setItem(KEY,JSON.stringify(d));renderAll();setSync('Planner geladen om '+new Date().toLocaleTimeString('nl-NL'));if(!auto)alert('Planner geladen.')}}catch(e){setSync('Laden mislukt.');if(!auto)alert(e)}}
function empOpts(empty='Kies...'){const d=data();return '<option value="">'+empty+'</option>'+d.employees.filter(e=>e.active!==false).map(e=>`<option value="${e.id}">${esc(e.name)}${e.rayon?' · '+esc(e.rayon):''}</option>`).join('')}function ename(id){const e=data().employees.find(x=>x.id===id);return e?e.name:''}function erayon(id){const e=data().employees.find(x=>x.id===id);return e?e.rayon:''}
function saveEmp(){if(!empName.value.trim()){alert('Vul naam in.');return}const d=data(),item={id:editEmp||uid(),name:empName.value.trim(),rayon:empRayon.value.trim(),phone:empPhone.value.trim(),active:empActive.value==='true'};if(editEmp)d.employees=d.employees.map(x=>x.id===editEmp?{...x,...item}:x);else d.employees.push(item);setData(d);clearEmp()}function clearEmp(){editEmp=null;empName.value='';empRayon.value='';empPhone.value='';empActive.value='true'}function editEmployee(id){const e=data().employees.find(x=>x.id===id);if(!e)return;editEmp=id;empName.value=e.name;empRayon.value=e.rayon||'';empPhone.value=e.phone||'';empActive.value=String(e.active!==false);show('med');scrollTo(0,0)}function delEmployee(id){if(!confirm('Verwijderen?'))return;const d=data();d.employees=d.employees.filter(x=>x.id!==id);setData(d)}
function saveAss(){if(!assProject.value.trim()||!assEmp.value){alert('Kies project en medewerker.');return}const p=project(assProject.value.trim()),d=data(),item={id:editAss||uid(),project:p.naam||assProject.value.trim(),code:p.code||'',employeeId:assEmp.value,reserveId:assRes.value,note:assNote.value.trim()};if(editAss)d.assignments=d.assignments.map(x=>x.id===editAss?{...x,...item}:x);else d.assignments.push(item);setData(d);clearAss()}function clearAss(){editAss=null;assProject.value='';assEmp.value='';assRes.value='';assNote.value=''}function editAssignment(id){const a=data().assignments.find(x=>x.id===id);if(!a)return;editAss=id;assProject.value=a.project;assEmp.value=a.employeeId;assRes.value=a.reserveId;assNote.value=a.note||'';show('bez');scrollTo(0,0)}function delAssignment(id){if(!confirm('Verwijderen?'))return;const d=data();d.assignments=d.assignments.filter(x=>x.id!==id);setData(d)}
function saveAbs(){if(!absEmp.value){alert('Kies medewerker.');return}let start,end,note=absNote.value.trim();if(absMode.value==='week'){if(!absYear.value||!absWeek.value){alert('Vul jaar en week in.');return}const r=weekRange(absYear.value,absWeek.value);start=r.start;end=r.end;note=absWNote.value.trim()}else{start=absStart.value;end=absEnd.value||absStart.value;if(!start){alert('Vul datum in.');return}}const d=data(),item={id:editAbs||uid(),employeeId:absEmp.value,type:absType.value,start,end,note};if(editAbs)d.absences=d.absences.map(x=>x.id===editAbs?{...x,...item}:x);else d.absences.push(item);setData(d);clearAbs()}function clearAbs(){editAbs=null;absEmp.value='';absType.value='Vakantie';absStart.value='';absEnd.value='';absNote.value='';absWeek.value='';absWNote.value=''}function editAbsence(id){const a=data().absences.find(x=>x.id===id);if(!a)return;editAbs=id;absMode.value='date';toggleMode('abs');absEmp.value=a.employeeId;absType.value=a.type;absStart.value=a.start;absEnd.value=a.end;absNote.value=a.note||'';show('verlof');scrollTo(0,0)}function delAbsence(id){if(!confirm('Verwijderen?'))return;const d=data();d.absences=d.absences.filter(x=>x.id!==id);setData(d)}
function saveCl(){if(!clProject.value.trim()){alert('Kies project.');return}let start,end,note=clNote.value.trim();if(clMode.value==='week'){if(!clYear.value||!clWeek.value){alert('Vul jaar en week in.');return}const r=weekRange(clYear.value,clWeek.value);start=r.start;end=r.end;note=clWNote.value.trim()}else{start=clStart.value;end=clEnd.value||clStart.value;if(!start){alert('Vul datum in.');return}}const p=project(clProject.value.trim()),d=data(),item={id:editCl||uid(),project:p.naam||clProject.value.trim(),code:p.code||'',type:clType.value,start,end,note};if(editCl)d.closures=d.closures.map(x=>x.id===editCl?{...x,...item}:x);else d.closures.push(item);setData(d);clearCl()}function clearCl(){editCl=null;clProject.value='';clType.value='Zomersluiting';clStart.value='';clEnd.value='';clNote.value='';clWeek.value='';clWNote.value=''}function editClosure(id){const c=data().closures.find(x=>x.id===id);if(!c)return;editCl=id;clMode.value='date';toggleMode('cl');clProject.value=c.project;clType.value=c.type;clStart.value=c.start;clEnd.value=c.end;clNote.value=c.note||'';show('sluit');scrollTo(0,0)}function delClosure(id){if(!confirm('Verwijderen?'))return;const d=data();d.closures=d.closures.filter(x=>x.id!==id);setData(d)}
function renderDash(){const d=data(),r=weekRange(year.value,week.value),rf=rayonFilter.value,abs=d.absences.filter(a=>overlap(a.start,a.end,r.start,r.end)),cl=d.closures.filter(c=>overlap(c.start,c.end,r.start,r.end)),absSet=new Set(abs.map(a=>a.employeeId));let rows=[];d.assignments.forEach(a=>{if(rf&&erayon(a.employeeId)!==rf&&erayon(a.reserveId)!==rf)return;const ma=abs.find(x=>x.employeeId===a.employeeId),ra=a.reserveId?abs.find(x=>x.employeeId===a.reserveId):null,closed=cl.find(x=>x.project===a.project||(x.code&&x.code===a.code));if(ma&&!closed)rows.push({s:'bad',project:a.project,emp:ename(a.employeeId),res:ename(a.reserveId),reason:ma.type,act:a.reserveId&&!ra?'Reserve beschikbaar':'Vervanging nodig'});else if(ma&&closed)rows.push({s:'ok',project:a.project,emp:ename(a.employeeId),res:ename(a.reserveId),reason:ma.type,act:'Klant gesloten, geen actie'})});kAbs.textContent=absSet.size;kClose.textContent=cl.length;kAct.textContent=rows.filter(x=>x.s==='bad').length;kCheck.textContent=0;actionWrap.innerHTML=rows.length?`<table><thead><tr><th>Status</th><th>Project</th><th>Medewerker</th><th>Reserve</th><th>Reden</th><th>Actie</th></tr></thead><tbody>${rows.map(x=>`<tr><td data-label="Status">${x.s==='bad'?'<span class="badg">🔴 Actie</span>':'<span class="ok">🟢 Geen actie</span>'}</td><td data-label="Project"><strong>${esc(x.project)}</strong></td><td data-label="Medewerker">${esc(x.emp)}</td><td data-label="Reserve">${esc(x.res)}</td><td data-label="Reden">${esc(x.reason)}</td><td data-label="Actie">${esc(x.act)}</td></tr>`).join('')}</tbody></table>`:'<div class="empty">Geen acties voor deze week.</div>';weekWrap.innerHTML=d.assignments.length?`<table><thead><tr><th>Project</th><th>Vaste medewerker</th><th>Reserve</th><th>Status</th></tr></thead><tbody>${d.assignments.map(a=>{const ma=abs.find(x=>x.employeeId===a.employeeId),closed=cl.find(x=>x.project===a.project||(x.code&&x.code===a.code));const st=closed?'<span class="ok">Gesloten</span>':ma?'<span class="badg">Vervanging nodig</span>':'<span class="ok">OK</span>';return `<tr><td data-label="Project">${esc(a.project)}</td><td data-label="Vast">${esc(ename(a.employeeId))}</td><td data-label="Reserve">${esc(ename(a.reserveId))}</td><td data-label="Status">${st}</td></tr>`}).join('')}</tbody></table>`:'<div class="empty">Nog geen bezetting gekoppeld.</div>'}
function renderEmp(){const d=data();empWrap.innerHTML=d.employees.length?`<table><thead><tr><th>Naam</th><th>Rayon</th><th>Telefoon</th><th>Status</th><th class="noPrint">Actie</th></tr></thead><tbody>${d.employees.map(e=>`<tr><td data-label="Naam"><strong>${esc(e.name)}</strong></td><td data-label="Rayon">${esc(e.rayon)}</td><td data-label="Telefoon">${esc(e.phone)}</td><td data-label="Status">${e.active!==false?'<span class="ok">Actief</span>':'<span class="maybe">Inactief</span>'}</td><td data-label="Actie" class="rowActions noPrint"><button class="secondary" onclick="editEmployee('${e.id}')">Bewerk</button><button class="danger" onclick="delEmployee('${e.id}')">Verwijder</button></td></tr>`).join('')}</tbody></table>`:'<div class="empty">Nog geen medewerkers.</div>'}
function renderAss(){const d=data();assWrap.innerHTML=d.assignments.length?`<table><thead><tr><th>Project</th><th>Vast</th><th>Reserve</th><th>Opmerking</th><th class="noPrint">Actie</th></tr></thead><tbody>${d.assignments.map(a=>`<tr><td data-label="Project"><strong>${esc(a.project)}</strong></td><td data-label="Vast">${esc(ename(a.employeeId))}</td><td data-label="Reserve">${esc(ename(a.reserveId))}</td><td data-label="Opmerking">${esc(a.note)}</td><td data-label="Actie" class="rowActions noPrint"><button class="secondary" onclick="editAssignment('${a.id}')">Bewerk</button><button class="danger" onclick="delAssignment('${a.id}')">Verwijder</button></td></tr>`).join('')}</tbody></table>`:'<div class="empty">Nog geen bezetting.</div>'}
function renderAbs(){const d=data();absWrap.innerHTML=d.absences.length?`<table><thead><tr><th>Medewerker</th><th>Type</th><th>Van</th><th>Tot</th><th>Opmerking</th><th class="noPrint">Actie</th></tr></thead><tbody>${d.absences.map(a=>`<tr><td data-label="Medewerker"><strong>${esc(ename(a.employeeId))}</strong></td><td data-label="Type">${esc(a.type)}</td><td data-label="Van">${fdate(a.start)}</td><td data-label="Tot">${fdate(a.end)}</td><td data-label="Opmerking">${esc(a.note)}</td><td data-label="Actie" class="rowActions noPrint"><button class="secondary" onclick="editAbsence('${a.id}')">Bewerk</button><button class="danger" onclick="delAbsence('${a.id}')">Verwijder</button></td></tr>`).join('')}</tbody></table>`:'<div class="empty">Nog geen afwezigheden.</div>'}
function renderCl(){const d=data();clWrap.innerHTML=d.closures.length?`<table><thead><tr><th>Project</th><th>Type</th><th>Van</th><th>Tot</th><th>Opmerking</th><th class="noPrint">Actie</th></tr></thead><tbody>${d.closures.map(c=>`<tr><td data-label="Project"><strong>${esc(c.project)}</strong></td><td data-label="Type">${esc(c.type)}</td><td data-label="Van">${fdate(c.start)}</td><td data-label="Tot">${fdate(c.end)}</td><td data-label="Opmerking">${esc(c.note)}</td><td data-label="Actie" class="rowActions noPrint"><button class="secondary" onclick="editClosure('${c.id}')">Bewerk</button><button class="danger" onclick="delClosure('${c.id}')">Verwijder</button></td></tr>`).join('')}</tbody></table>`:'<div class="empty">Nog geen sluitingen.</div>'}
function renderSelects(){assEmp.innerHTML=empOpts();assRes.innerHTML=empOpts('Geen reserve');absEmp.innerHTML=empOpts()}function renderRayons(){const cur=rayonFilter.value,rs=[...new Set(data().employees.map(e=>e.rayon).filter(Boolean))].sort();rayonFilter.innerHTML='<option value="">Alle rayons</option>'+rs.map(r=>`<option ${r===cur?'selected':''}>${esc(r)}</option>`).join('')}function renderAll(){fillProjects();renderSelects();renderRayons();renderEmp();renderAss();renderAbs();renderCl();renderDash()}function init(){const n=new Date();year.value=n.getFullYear();week.value=curWeek();absYear.value=n.getFullYear();clYear.value=n.getFullYear();getProjects();renderAll();loadPlanner(true)}document.addEventListener('DOMContentLoaded',init);
</script></main></body></html>
